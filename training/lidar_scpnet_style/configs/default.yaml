seed: 42
output_dir: runs/scpnet_style
data:
  preprocess_root: /path/to/lidar_npz_root
  scene_filter: []
  split_ratios:
  - 0.7
  - 0.15
  - 0.15
  split_files:
    train: ''
    val: ''
    test: ''
model:
  name: scpnet_style
  num_classes: 26
  infer_num_classes_from_data: true
  in_channels: 4
  nz: 32
  bev_base: 64
  hidden_dim: 64
train:
  batch_size: 2
  epochs: 25
  num_workers: 4
  lr: 0.0002
  weight_decay: 0.0001
  amp: true
  occ_loss_weight: 0.25
  grad_clip: 1.0
